name: Contract Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run sony:validate
      - run: pnpm run sony:diff -- --ci
